<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dossier — Timonia OS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:13px;color:#0B0B0B;background:#F5F5F3}
:root{
  --green:#5FA694;--gl:#E1F5EE;--gd:#0F6E56;
  --orange:#FF8352;--ol:#FAECE7;--od:#993C1D;
  --blue:#378ADD;--bl:#E6F1FB;--bd:#185FA5;
  --red:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;
  --yellow:#EDA100;--yl:#FAEEDA;--yd:#854F0B;
  --purple:#7F77DD;--pl:#EEEDFE;--pd:#534AB7;
  --border:#E1E0D9;--bg:#F5F5F3;--s0:#FAFAF9;--s1:#FFFFFF;
  --t1:#0B0B0B;--t2:#52514E;--t3:#898781;
  --nav:#1C1C1C;--r:8px;--rl2:12px
}
.page{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:12px;padding:9px 16px;background:var(--nav);flex-shrink:0}
.tb-logo{display:flex;align-items:center;gap:8px;color:#fff;font-size:13px;font-weight:700}
.tb-mark{width:26px;height:26px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.tb-back{display:inline-flex;align-items:center;gap:5px;color:#bbb;font-size:12px;font-weight:600;text-decoration:none;padding:5px 9px;border-radius:6px;transition:all .15s}
.tb-back:hover{background:#2a2a2a;color:#fff}
.tb-user{margin-left:auto;display:flex;align-items:center;gap:8px;color:#bbb;font-size:12px;font-weight:600}
.tb-av{width:26px;height:26px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}

/* HEADER DOSSIER */
.dh{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 20px;flex-shrink:0}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.dh-ref{font-size:10px;font-family:monospace;color:var(--t3);margin-bottom:3px}
.dh-name{font-size:20px;font-weight:700;margin-bottom:6px}
.dh-meta{font-size:11px;color:var(--t3);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.dh-actions{display:flex;gap:6px;flex-shrink:0}

/* BODY */
.body{flex:1;display:flex;overflow:hidden;min-height:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--s1);padding:0 20px;flex-shrink:0;overflow-x:auto}
.tab{display:flex;align-items:center;gap:5px;padding:11px 15px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--t3);white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none;font-family:inherit;transition:all .15s}
.tab:hover{color:var(--t1)}.tab.active{color:var(--t1);border-bottom-color:var(--green)}
.tab.admin{color:var(--purple)}.tab.admin.active{border-bottom-color:var(--purple)}
.panes{flex:1;overflow-y:auto;padding:18px 20px}
.pane{display:none}.pane.active{display:block}

/* MESSAGERIE RAIL (visible partout) */
.rail{width:320px;flex-shrink:0;border-left:1px solid var(--border);background:var(--s1);display:flex;flex-direction:column;overflow:hidden}
.rail-head{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.rail-title{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
.msg-toggle{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.msg-tog{flex:1;padding:7px 6px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;color:var(--t3);transition:all .15s;line-height:1.3}
.msg-tog.active.client{background:var(--blue);color:#fff}
.msg-tog.active.equipe{background:var(--purple);color:#fff}
.msg-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg-bubble{border-radius:11px;padding:9px 12px;font-size:12px;line-height:1.5;max-width:88%}
.msg-in{background:var(--bg);border:1px solid var(--border);border-radius:11px 11px 11px 0;align-self:flex-start}
.msg-out{border-radius:11px 11px 0 11px;align-self:flex-end}
.msg-out.client{background:var(--bl)}
.msg-out.equipe{background:var(--pl)}
.msg-meta{font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px}
.msg-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:6px}
.msg-input{flex:1;border:1.5px solid var(--border);border-radius:var(--r);padding:8px 10px;font-size:12px;font-family:inherit;outline:none}
.msg-input:focus{border-color:var(--green)}
.rail-scope{font-size:10px;color:var(--t3);margin-top:7px;line-height:1.4;text-align:center}

/* CARDS / UTILS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl2);padding:14px;margin-bottom:12px}
.card-title{font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.bg{background:var(--gl);color:var(--gd)}.bo{background:var(--ol);color:var(--od)}.bb{background:var(--bl);color:var(--bd)}.br{background:var(--rl);color:var(--rd)}.by{background:var(--yl);color:var(--yd)}.bp{background:var(--pl);color:var(--pd)}.bgr{background:var(--bg);color:var(--t3);border:1px solid var(--border)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 11px;border-radius:var(--r);font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--s1);color:var(--t1);cursor:pointer;font-family:inherit;transition:all .15s}.btn:hover{background:var(--bg)}
.btn-sm{padding:4px 8px;font-size:10px}
.btn-g{background:var(--green);color:#fff;border-color:var(--green)}.btn-g:hover{opacity:.9}
.btn-p{background:var(--orange);color:#fff;border-color:var(--orange)}.btn-p:hover{opacity:.9}
.btn-b{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-b:hover{opacity:.9}
.btn-danger{border-color:var(--red);color:var(--red)}.btn-danger:hover{background:var(--rl)}
.btn-ghost{background:none;border:none;color:var(--t3);padding:3px 6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600}.btn-ghost:hover{color:var(--t1)}
.fr{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.fr:last-child{border-bottom:none}
.fl{color:var(--t3);min-width:90px;font-size:11px}
.fv{font-weight:600}

/* FRISE MACRO */
.frise{display:flex;gap:0;padding:6px 0 4px;overflow-x:auto}
.fs{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:110px;position:relative}
.fs:not(:last-child)::after{content:'';position:absolute;top:15px;left:56%;right:-44%;height:2px;background:var(--border);z-index:0}
.fs.done::after{background:var(--green)}
.fs.active::after{background:linear-gradient(to right,var(--orange),var(--border))}
.fs-dot{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:13px;z-index:1;position:relative}
.fs.done .fs-dot{background:var(--green);border-color:var(--green);color:#fff}
.fs.active .fs-dot{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 0 4px var(--ol)}
.fs-lbl{font-size:10px;text-align:center;font-weight:700;color:var(--t3);line-height:1.3}
.fs.done .fs-lbl{color:var(--gd)}.fs.active .fs-lbl{color:var(--od)}

/* PLAN DE VOL COLONNES */
.pdv{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
@media(max-width:900px){.pdv{grid-template-columns:1fr}}

/* ETAPE-TACHE */
.task{border:1px solid var(--border);border-radius:var(--rl2);padding:11px 13px;margin-bottom:8px;background:var(--s1);transition:all .15s}
.task.done{background:var(--gl);border-color:#9BD3C4}
.task.active{border-color:var(--orange);background:var(--ol)}
.task-head{display:flex;align-items:flex-start;gap:10px}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:var(--s1);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:800;color:#fff;transition:all .15s;margin-top:1px}
.task.done .task-check{background:var(--green);border-color:var(--green)}
.task.active .task-check{border-color:var(--orange)}
.task.active .task-check:hover{background:var(--orange)}
.task-body{flex:1;min-width:0}
.task-title{font-size:12px;font-weight:700;color:var(--t1);margin-bottom:2px}
.task.done .task-title{color:var(--gd)}
.task-desc{font-size:11px;color:var(--t2);line-height:1.5}
.task-justif{margin-top:8px;background:var(--s1);border:1px solid #9BD3C4;border-radius:var(--r);padding:8px 10px;font-size:11px;color:var(--gd)}
.task-justif-lbl{font-weight:700;display:flex;align-items:center;gap:4px;margin-bottom:2px}
.task-doc{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--bd);margin-top:4px}
.task-todo-note{margin-top:6px;font-size:10px;color:var(--od);font-weight:600}

/* JOURNAL */
.journal{display:flex;flex-direction:column;gap:0}
.j-item{display:flex;gap:11px;position:relative;padding-bottom:14px}
.j-item:last-child{padding-bottom:0}
.j-item:not(:last-child)::before{content:'';position:absolute;left:10px;top:22px;bottom:0;width:1.5px;background:var(--border)}
.j-dot{width:21px;height:21px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;z-index:1}
.j-done{background:var(--green);color:#fff}.j-info{background:var(--bg);color:var(--t3);border:1.5px solid var(--border)}
.j-body{flex:1;padding-top:1px}
.j-date{font-size:10px;color:var(--t3);margin-bottom:2px;font-weight:600}
.j-text{font-size:12px;line-height:1.5;color:var(--t2)}
.j-text strong{color:var(--t1)}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.photo-card{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:var(--s1)}
.photo-img{width:100%;height:130px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:34px;border-bottom:1px solid var(--border)}
.photo-meta{padding:8px 10px}
.photo-date{font-size:10px;color:var(--t3);margin-bottom:3px}
.photo-caption{font-size:11px;color:var(--t2);line-height:1.4}

/* DOCUMENTS */
.doc-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r);background:var(--s1);border:1px solid var(--border);margin-bottom:7px}
.doc-icon{width:32px;height:32px;border-radius:7px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.doc-actions{display:flex;gap:5px;margin-left:auto;flex-shrink:0}

/* ROLE SLOTS (admin) */
.role-slot{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--s0);margin-bottom:6px}
.role-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.role-name{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;min-width:52px}
.role-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0}
.pct-input{width:52px;padding:4px 6px;border-radius:5px;border:1.5px solid var(--border);font-size:12px;font-weight:700;text-align:center;font-family:inherit;outline:none;background:var(--s1)}
.pct-input:focus{border-color:var(--orange)}
.fact-input{border:1.5px solid var(--border);border-radius:5px;padding:4px 7px;font-size:12px;font-family:inherit;outline:none;text-align:right;width:100%}
.fact-input:focus{border-color:var(--green)}
.fact-input.payee{border-color:var(--green);background:var(--gl)}

/* MODAL JUSTIFICATIF */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:200;align-items:center;justify-content:center}
.mo.open{display:flex}
.mo-box{background:var(--s1);border-radius:16px;width:440px;max-width:94vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mo-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:14px;font-weight:700}
.mo-body{padding:16px}.mo-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end}
.mo-close{background:none;border:none;font-size:17px;cursor:pointer;color:var(--t3)}.mo-close:hover{color:var(--t1)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.form-group input,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:9px 11px;font-size:13px;font-family:inherit;outline:none;color:var(--t1);resize:vertical}
.form-group input:focus,.form-group textarea:focus{border-color:var(--green)}
.drop-zone{border:1.5px dashed var(--border);border-radius:var(--r);padding:14px;text-align:center;font-size:11px;color:var(--t3);cursor:pointer;transition:all .15s}
.drop-zone:hover{border-color:var(--green);color:var(--green);background:var(--gl)}

::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

  ⚠️ NOTE POUR CLAUDE CODE — PAGE DOSSIER = ROUTE DÉDIÉE
  Cette page remplace la fiche en overlay du dashboard partner. Chaque dossier

  client (dashboard-client.html). Les étapes détaillées ci-dessous (« Plan de
  vol ») sont la déclinaison opérationnelle interne de chaque phase macro.
  Voir FRISE_BY_TYPE et MACRO_FOR_PIPE plus bas.
═══════════════════════════════════════════════════════════════════════════ -->

</div>

<!-- MODAL JUSTIFICATIF -->
<div class="mo" id="justifModal" onclick="if(event.target===this)closeModal('justifModal')">

    <div class="mo-head">✅ Valider une tâche<button class="mo-close" onclick="closeModal('justifModal')">✕</button></div>

      <button class="btn btn-g" onclick="confirmJustif()">✓ Valider la tâche</button>
    </div>
  </div>
</div>

/* ═══ PLAN DE VOL ═══ */
function renderPDV(){
  var frise=friseFor(D.type);
  var activeMacro=macroKey(D.pipe,D.type);
  var mIdx=frise.map(function(f){return f.k;}).indexOf(activeMacro);
  var friseHtml=frise.map(function(f,i){
    var cls=i<mIdx?'done':i===mIdx?'active':'';
    return '<div class="fs '+cls+'"><div class="fs-dot">'+(i<mIdx?'✓':f.icon)+'</div><div class="fs-lbl">'+f.lbl+'</div></div>';
  }).join('');

  var steps=PIPE_STEPS[D.pipe]||[];
  var activeIdx=steps.indexOf(D.step);
  var store=taskStore();
  var tasksHtml=steps.map(function(s,i){
    var saved=store[s];
    var isDone=(i<activeIdx)||(saved&&saved.done);
    var isActive=(s===D.step)&&!isDone;
    var desc=(TASK_DESC[D.pipe]||{})[s]||'';
    var cls=isDone?'done':isActive?'active':'';
    var justifHtml='';
    if(isDone){
      var jt=saved?saved.justif:'Étape validée.';
      var jd=saved?saved.ts:'';
      var doc=saved&&saved.doc?'<div class="task-doc">📎 '+saved.doc+'</div>':'';
      justifHtml='<div class="task-justif"><div class="task-justif-lbl">✓ Fait'+(jd?' · '+jd:'')+'</div>'+jt+doc+'</div>';
    } else if(isActive){
      justifHtml='<div class="task-todo-note">⚡ Étape en cours — cochez la case une fois réalisée pour ajouter le justificatif.</div>';
    }
    return '<div class="task '+cls+'" id="task-'+i+'">'+
      '<div class="task-head">'+
        '<div class="task-check" onclick="'+(isActive?'openJustif('+i+')':(isDone?'undoTask('+i+')':''))+'" title="'+(isDone?'Annuler':'Marquer comme fait')+'">'+(isDone?'✓':'')+'</div>'+
        '<div class="task-body">'+
          '<div class="task-title">'+s+'</div>'+
          (desc?'<div class="task-desc">'+desc+'</div>':'')+
          justifHtml+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('pane-pdv').innerHTML=
    '<div class="card"><div class="card-title">🗺️ Parcours du client</div><div class="frise">'+friseHtml+'</div></div>'+
    '<div class="pdv">'+
      '<div>'+
        '<div class="card-title">✅ Étapes de la mission — ce que je dois faire</div>'+
        tasksHtml+
      '</div>'+
      '<div>'+
        '<div class="card-title">📋 Journal du dossier<span style="font-size:10px;font-weight:400;color:var(--t3);text-transform:none;letter-spacing:0">récent en haut</span></div>'+
        '<div class="journal" id="journal"></div>'+
      '</div>'+
    '</div>';
  renderJournal();
}

function renderJournal(){
  var events=journalStore().slice();
  events.push({ts:new Date(D.created).toISOString(),label:new Date(D.created).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}),text:'<strong>Dossier créé</strong> — inscription du client.',type:'info'});
  events.sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
  document.getElementById('journal').innerHTML=events.map(function(e){
    return '<div class="j-item"><div class="j-dot '+(e.type==='done'?'j-done':'j-info')+'">'+(e.type==='done'?'✓':'•')+'</div>'+
      '<div class="j-body"><div class="j-date">'+(e.label||new Date(e.ts).toLocaleDateString('fr-FR'))+'</div><div class="j-text">'+e.text+'</div></div></div>';
  }).join('');
}

/* JUSTIFICATIF */
var justifTarget=null, justifDoc='';
function openJustif(i){justifTarget=i;justifDoc='';
  var steps=PIPE_STEPS[D.pipe]||[];
  document.getElementById('justif-task').textContent=steps[i];
  document.getElementById('justif-text').value='';
  document.getElementById('justif-docname').textContent='Déposer un fichier (PDF, photo…)';
  openModal('justifModal');
}
function fakeAttach(){justifDoc='justificatif-'+Date.now()+'.pdf';document.getElementById('justif-docname').textContent=justifDoc+' ✓';}
function confirmJustif(){
  if(justifTarget===null)return;
  var steps=PIPE_STEPS[D.pipe]||[];var s=steps[justifTarget];
  var txt=document.getElementById('justif-text').value.trim()||'Étape validée.';
  var ts=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var store=taskStore();store[s]={done:true,justif:txt,doc:justifDoc||'',ts:ts};saveTaskStore(store);
  var jn=journalStore();jn.push({ts:new Date().toISOString(),label:ts,text:'<strong>'+s+'</strong> — '+txt,type:'done'});saveJournal(jn);
  // avancer le step courant si on validait l'étape active
  if(s===D.step){var idx=steps.indexOf(s);if(idx<steps.length-1)D.step=steps[idx+1];}
  closeModal('justifModal');justifTarget=null;
  renderPDV();renderHeader();
}
function undoTask(i){
  var steps=PIPE_STEPS[D.pipe]||[];var s=steps[i];
  var store=taskStore();delete store[s];saveTaskStore(store);
  D.step=s; // on repositionne l'étape courante ici
  renderPDV();renderHeader();
}

      actions='<button class="btn btn-g btn-sm" onclick="setDocStatus('+i+',\'valide\')">✓ Valider</button>'+
              '<button class="btn btn-danger btn-sm" onclick="setDocStatus('+i+',\'refuse\')">✗ Refuser</button>';
    } else {
      actions='<button class="btn-ghost" onclick="setDocStatus('+i+',\'attente\')">↺ Rétablir</button>';

      '<a href="https://drive.google.com" target="_blank" class="btn btn-sm">Ouvrir →</a>'+
      '<div class="doc-actions">'+actions+'</div>'+
    '</div>';
  }).join('');
}
function setDocStatus(i,st){
  var d=(D.docs||[])[i];if(!d)return;
  var o=docStore();o[d.name]=st;saveDocStore(o);
  if(st!=='attente'){var jn=journalStore();jn.push({ts:new Date().toISOString(),label:new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}),text:'Document <strong>'+d.name+'</strong> '+(st==='valide'?'validé.':'refusé.'),type:'done'});saveJournal(jn);}

}

    var trig=D.equipe[role];var m=trig?MANDATAIRES.find(function(x){return x.trig===trig;}):null;
    var opts=MANDATAIRES.filter(function(x){return x.actif;}).map(function(x){return '<option value="'+x.trig+'"'+(trig===x.trig?' selected':'')+'>'+x.trig+' - '+x.nom+'</option>';}).join('');
    return '<div class="role-slot"><div class="role-dot" style="background:'+ROLE_COLORS[role]+'"></div><div class="role-name">'+ROLE_LABELS[role]+'</div>'+
      '<div style="display:flex;align-items:center;gap:7px;flex:1">'+(m?'<div class="role-av" style="background:'+m.color+'">'+m.trig.slice(0,2)+'</div>':'')+
      '<select style="font-size:11px;padding:4px 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg);font-family:inherit;flex:1" onchange="updateEquipe(\''+role+'\',this.value)"><option value="">– Non assigné –</option>'+opts+'</select></div>'+
      '<div style="display:flex;align-items:center;gap:4px"><input type="number" class="pct-input" value="'+D.pct[role]+'" min="0" max="60" id="pct-'+role+'" oninput="updatePct(\''+role+'\',this.value)"> %</div>'+
    '</div>';
  }).join('');
  var totalPct=Object.values(D.pct).reduce(function(a,b){return a+b;},0);

  var factHtml=['lead','sale','front','back'].filter(function(r){return D.equipe[r];}).map(function(role){
    var m=MANDATAIRES.find(function(x){return x.trig===D.equipe[role];});
    return '<div style="font-size:10px;font-weight:700;color:var(--t3);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.05em">'+ROLE_LABELS[role]+' – '+(m?m.nom:'')+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
        '<div><div style="font-size:10px;color:var(--t3);margin-bottom:4px">Facture envoyée</div><input type="text" class="fact-input" value="'+D.fact_envoyee[role]+'" placeholder="0 €" oninput="D.fact_envoyee[\''+role+'\']=this.value"></div>'+
        '<div><div style="font-size:10px;color:var(--t3);margin-bottom:4px">Facture payée</div><input type="text" class="fact-input'+(D.fact_payee[role]?' payee':'')+'" value="'+D.fact_payee[role]+'" placeholder="0 €" oninput="D.fact_payee[\''+role+'\']=this.value"></div>'+
      '</div>';
  }).join('')||'<div style="font-size:11px;color:var(--t3)">Aucun mandataire assigné.</div>';

  document.getElementById('pane-admin').innerHTML=
    '<div class="card"><div class="card-title">👥 Affectation & commissions</div>'+rolesHtml+
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--bg);border-radius:var(--r);margin-top:6px;font-size:12px">'+
        '<span>Total mandataires : <strong id="total-pct" style="color:'+(totalPct<=60?'var(--green)':'var(--red)')+'">'+totalPct+'%</strong></span>'+
        '<span>Siège Timonia : <strong>'+(100-totalPct)+'%</strong></span>'+
        '<button class="btn btn-g btn-sm" onclick="saveEquipe()">💾 Enregistrer</button>'+
      '</div>'+
    '</div>'+
    '<div class="card"><div class="card-title">💰 Facturation'+
        '<button class="btn btn-p btn-sm" onclick="alert(\'Lien Stripe envoyé au client.\')">💳 Envoyer lien Stripe</button>'+
      '</div>'+factHtml+'</div>';
}
function updateEquipe(role,trig){D.equipe[role]=trig||null;if(!trig)D.pct[role]=0;else if(!D.pct[role])D.pct[role]=ROLE_DEFAULT_PCT[role]||0;renderAdmin();}
function updatePct(role,val){D.pct[role]=parseInt(val)||0;var t=Object.values(D.pct).reduce(function(a,b){return a+b;},0);var el=document.getElementById('total-pct');if(el){el.textContent=t+'%';el.style.color=t<=60?'var(--green)':'var(--red)';}}
function saveEquipe(){var t=Object.values(D.pct).reduce(function(a,b){return a+b;},0);if(t>60){alert('Le total des commissions mandataires ne peut pas dépasser 60% (siège 40%). Actuellement : '+t+'%');return;}alert('Affectation enregistrée ✓\nSiège Timonia : '+(100-t)+'%');renderProjet();}

/* ═══ MESSAGERIE (persistante) ═══ */
function setMsgMode(mode){currentMsgMode=mode;
  document.getElementById('mtog-client').classList.toggle('active',mode==='client');
  document.getElementById('mtog-equipe').classList.toggle('active',mode==='equipe');
  document.getElementById('rail-scope').textContent=mode==='client'?'Visible par le client dans son espace.':'Interne — invisible pour le client.';
  renderMsgs();
}
function renderMsgs(){
  var msgs=currentMsgMode==='client'?D.messages_pub:D.messages_priv;
  var el=document.getElementById('msg-list');
  el.innerHTML=msgs.length?msgs.map(function(m){
    var isOut=m.from==='admin';
    return '<div class="msg-bubble '+(isOut?'msg-out '+currentMsgMode:'msg-in')+'"><div class="msg-meta">'+(isOut?'Vous':m.nom)+' · '+new Date(m.ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})+'</div>'+m.text+'</div>';
  }).join(''):'<div style="padding:20px;text-align:center;font-size:12px;color:var(--t3)">'+(currentMsgMode==='client'?'Aucun message avec le client.':'Aucun message d\'équipe.')+'</div>';
  el.scrollTop=el.scrollHeight;
}
function sendMsg(){
  var inp=document.getElementById('msg-input');var txt=inp.value.trim();if(!txt)return;
  var msg={from:'admin',nom:'Vous',text:txt,ts:new Date().toISOString()};
  if(currentMsgMode==='client')D.messages_pub.push(msg);else D.messages_priv.push(msg);
  inp.value='';renderMsgs();
}

/* ═══ ACTIONS HEADER ═══ */
function avancerEtape(){var steps=PIPE_STEPS[D.pipe]||[];var idx=steps.indexOf(D.step);if(idx<steps.length-1){D.step=steps[idx+1];renderPDV();}else alert('Dernière étape de ce pipe atteinte.');}
function relancer(){alert('Relance envoyée au client et à l\'équipe.');}
function abandonner(){if(confirm('Abandonner ce dossier ?')){D.abandoned=true;renderHeader();var jn=journalStore();jn.push({ts:new Date().toISOString(),label:new Date().toLocaleDateString('fr-FR'),text:'<strong>Dossier abandonné.</strong>',type:'info'});saveJournal(jn);renderJournal();}}

/* ═══ TABS / MODAL ═══ */
function openTab(id,btn){document.querySelectorAll('.pane').forEach(function(el){el.classList.remove('active');});document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active');});document.getElementById('pane-'+id).classList.add('active');if(btn)btn.classList.add('active');}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

/* Lancement une fois toutes les déclarations prêtes */
init();
</script>
</body>
