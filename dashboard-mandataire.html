<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Espace mandataire — Timonia</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
body{background:var(--bg)}
.layout{display:flex;height:calc(100vh - 57px);overflow:hidden}
.sidebar{width:250px;flex-shrink:0;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.sidebar-search{position:relative}
.sidebar-search input{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px 6px 26px;font-size:11px;background:var(--bg);outline:none}
.sidebar-search::before{content:'🔍';position:absolute;left:7px;top:7px;font-size:10px;pointer-events:none}
.sidebar-pills{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.spill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;cursor:pointer;border:1px solid var(--border);color:var(--text3);background:var(--bg);transition:all .12s}
.spill.on{color:#fff;border-color:transparent}
.dossier-list{flex:1;overflow-y:auto}
.d-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.d-item:hover{background:var(--bg)}
.d-item.active{background:var(--blue-light);border-left-color:var(--blue)}
.d-ref{font-size:9px;font-family:monospace;color:var(--text3);margin-bottom:2px}
.d-name{font-size:12px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-foot{display:flex;align-items:center;justify-content:space-between;gap:4px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.detail{flex:1;overflow-y:auto;padding:20px}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3);padding:40px}
/* ACTIONS */
.action-card{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surf2);margin-bottom:7px;cursor:pointer;transition:all .15s}
.action-card:hover{border-color:var(--green)}
.action-card.urgent{border-color:var(--orange);background:var(--orange-light)}
.action-card.blocked{border-color:var(--red);background:var(--red-light)}
.action-icon{font-size:20px;flex-shrink:0}
/* COMM */
.comm-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;gap:1px;margin:8px 0}
.comm-seg{height:100%}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo"><div class="nav-logo-mark">T</div><span>Timonia</span></div>
  <div class="nav-right">
    <div class="nav-avatar" id="navAv" style="background:#FF8352">CG</div>
    <div><div class="nav-name" id="navName">—</div><div class="nav-role">Mandataire</div></div>
    <button class="btn btn-ghost btn-sm" onclick="authLogout()">Déconnexion</button>
  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-label">Mes dossiers</div>
      <div class="sidebar-search"><input type="text" placeholder="Chercher…" oninput="filterDossiers(this.value)" id="search-input"></div>
    </div>
    <div class="sidebar-pills">
      <span class="spill on" style="background:var(--text2)" onclick="setPill('tous',this)">Tous</span>
      <span class="spill" onclick="setPill('audit',this)">Audit</span>
      <span class="spill" onclick="setPill('mise_en_oeuvre',this)" style="">Œuvre</span>
      <span class="spill" onclick="setPill('valorisation',this)">Valo.</span>
    </div>
    <div class="dossier-list" id="dossier-list"></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabs" id="detail-tabs" style="display:none">
      <button class="tab active" onclick="openPTab('dossier',this)">📋 Dossier</button>
      <button class="tab" onclick="openPTab('timeline',this)">🗺️ Timeline</button>
      <button class="tab" onclick="openPTab('actions',this)">⚡ Actions</button>
      <button class="tab" onclick="openPTab('commissions',this)">💰 Commissions</button>
    </div>
    <div style="flex:1;overflow-y:auto" id="detail-wrap">
      <div class="empty-state" id="empty-state">
        <div style="font-size:40px">📂</div>
        <div style="font-size:14px;font-weight:600">Sélectionnez un dossier</div>
      </div>
      <div style="display:none" id="detail-content">
        <div class="tab-content active" id="ptab-dossier" style="padding:20px"></div>
        <div class="tab-content" id="ptab-timeline" style="padding:20px"></div>
        <div class="tab-content" id="ptab-actions" style="padding:20px"></div>
        <div class="tab-content" id="ptab-commissions" style="padding:20px"></div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const u=authRedirect();
if(u){
  document.getElementById('navAv').textContent=u.initials;
  document.getElementById('navAv').style.background=u.color;
  document.getElementById('navName').textContent=u.nom;
}

let activePill='tous', activeD=null;

function filterDossiers(q){renderList(q);}
function setPill(p,el){
  activePill=p;
  document.querySelectorAll('.spill').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.color='';});
  el.classList.add('on');
  const colors={tous:'var(--text2)',audit:'#7F77DD',mise_en_oeuvre:'#FF8352',valorisation:'#5FA694',conseil_flash:'#EDA100'};
  el.style.background=colors[p]||'var(--text2)';
  el.style.color='#fff';
  renderList(document.getElementById('search-input').value);
}

function renderList(q=''){
  let data=DOSSIERS;
  if(activePill!=='tous') data=data.filter(d=>d.expertise_id===activePill);
  if(q) data=data.filter(d=>d.client_nom.toLowerCase().includes(q.toLowerCase())||d.ref.toLowerCase().includes(q.toLowerCase()));
  const exp_colors={conseil_flash:'#EDA100',audit:'#7F77DD',mise_en_oeuvre:'#FF8352',valorisation:'#5FA694'};
  document.getElementById('dossier-list').innerHTML=data.map(d=>{
    const exp=getExpertise(d.expertise_id);
    const urgent=d.sla!==null&&d.sla<0;
    return `<div class="d-item${d.id===activeD?' active':''}" onclick="selectDossier('${d.id}')">
      <div class="d-ref">${d.ref}</div>
      <div class="d-name">${d.client_nom}</div>
      <div class="d-foot">
        <span class="badge" style="background:${exp?exp.colorLight:'var(--bg)'};color:${exp?exp.colorDark:'var(--text3)'}">
          ${exp?exp.icon+' '+exp.label:'—'}</span>
        <span class="badge ${slaClass(d.sla)}">${slaLabel(d.sla)}</span>
      </div>
    </div>`;
  }).join('')||'<div style="padding:20px;text-align:center;font-size:12px;color:var(--text3)">Aucun dossier</div>';
}

function selectDossier(id){
  activeD=id;renderList(document.getElementById('search-input').value);
  const d=getDossier(id);if(!d)return;
  const exp=getExpertise(d.expertise_id);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('detail-content').style.display='block';
  document.getElementById('detail-tabs').style.display='flex';
  renderDossierTab(d,exp);
  renderTimelineTab(d,exp);
  renderActionsTab(d,exp);
  renderCommissionsTab(d,exp);
}

function openPTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('ptab-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
}

function renderDossierTab(d,exp){
  document.getElementById('ptab-dossier').innerHTML=`
    <div class="grid2">
      <div class="card">
        <div class="card-title">👤 Client</div>
        <div class="field-row"><span class="field-lbl">Nom</span><span class="field-val">${d.client_nom}</span></div>
        <div class="field-row"><span class="field-lbl">Bien</span><span class="field-val" style="font-size:11px">${d.bien}</span></div>
        <div class="field-row"><span class="field-lbl">Référence</span><span class="field-val" style="font-family:monospace;font-size:10px">${d.ref}</span></div>
        <div class="field-row"><span class="field-lbl">Statut</span><span class="field-val"><span class="badge ${d.statut==='actif'?'badge-green':'badge-gray'}">${d.statut==='actif'?'● Actif':'Clôturé'}</span></span></div>
        <div class="field-row"><span class="field-lbl">SLA</span><span class="field-val"><span class="badge ${slaClass(d.sla)}">${slaLabel(d.sla)}</span></span></div>
      </div>
      <div class="card">
        <div class="card-title">📝 Situation</div>
        <div style="font-size:12px;line-height:1.7;color:var(--text2);background:var(--bg);border-radius:var(--radius);padding:10px;border-left:3px solid var(--orange)">${d.situation}</div>
        <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px">${d.tags.map(t=>`<span class="badge badge-gray">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="card-title">${exp.icon} Expertise — ${exp.label}</div>
      <div class="pipe-steps">
        ${exp.etapes.map((et,i)=>{
          const isDone=d.etapes_done.includes(et.id);
          const isActive=et.id===d.etape_active;
          return `<div class="ps ${isDone?'ps-done':isActive?'ps-active':''}">
            <div class="ps-dot">${isDone?'✓':isActive?'!':i+1}</div>
            <div class="ps-lbl">${et.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderTimelineTab(d,exp){
  const tl=exp.etapes.map((et,i)=>{
    const isDone=d.etapes_done.includes(et.id);
    const isActive=et.id===d.etape_active;
    const dotCls=isDone?'dot-done':isActive?'dot-active':'dot-wait';
    let advance='';
    if(isActive){
      advance=`<div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="advanceStep('${d.id}','${et.id}')">✅ Marquer comme fait</button>
        <button class="btn btn-ghost btn-sm">📝 Ajouter note</button>
      </div>`;
    }
    return `<div class="tl-item">
      <div class="tl-dot ${dotCls}">${isDone?'✓':isActive?'!':i+1}</div>
      <div class="tl-body">
        <div class="tl-head">
          <span class="tl-title">${et.label}</span>
          ${isDone?'<span class="badge badge-green">✓ Fait</span>':isActive?'<span class="badge badge-orange">⚡ En cours</span>':'<span class="badge badge-gray">À venir</span>'}
        </div>
        <div class="tl-date">${et.desc} · ${et.role==='client'?'Action client requise':'Action mandataire'}</div>
        ${isActive&&d.sla<0?`<div class="alert alert-red" style="margin-top:6px">⚠️ SLA dépassé de ${Math.abs(d.sla)} jours</div>`:''}
        ${advance}
      </div>
    </div>`;
  }).join('');
  document.getElementById('ptab-timeline').innerHTML=`<div class="card"><div class="card-title">🗺️ Suivi des étapes</div><div class="tl">${tl}</div></div>`;
}

function renderActionsTab(d,exp){
  const activeEt=exp.etapes.find(e=>e.id===d.etape_active);
  let actions='';
  if(d.sla!==null&&d.sla<0){
    actions+=`<div class="action-card blocked">
      <div class="action-icon">🚨</div>
      <div><div style="font-weight:700;font-size:12px;color:var(--red-dark)">SLA dépassé — ${Math.abs(d.sla)} jours de retard</div>
      <div style="font-size:11px;color:var(--red-dark)">Escalader au management Timonia</div></div>
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="alert('Escalade envoyée')">Escalader</button>
    </div>`;
  }
  if(activeEt&&activeEt.role==='client'){
    actions+=`<div class="action-card urgent">
      <div class="action-icon">⏳</div>
      <div><div style="font-weight:700;font-size:12px;color:var(--orange-dark)">En attente de validation client</div>
      <div style="font-size:11px;color:var(--orange-dark)">Étape : ${activeEt.label}</div></div>
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="alert('Relance envoyée au client !')">Relancer</button>
    </div>`;
  }
  actions+=`<div class="action-card" onclick="alert('Rapport généré')">
    <div class="action-icon">📄</div>
    <div><div style="font-weight:700;font-size:12px">Générer un document modèle</div><div style="font-size:11px;color:var(--text3)">Protocole, rapport, courrier</div></div>
    <span style="margin-left:auto;font-size:18px">→</span>
  </div>
  <div class="action-card" onclick="alert('Score calculé')">
    <div class="action-icon">🧠</div>
    <div><div style="font-weight:700;font-size:12px">Score de résolvabilité IA</div><div style="font-size:11px;color:var(--text3)">Évaluer la complexité du dossier</div></div>
    <span style="margin-left:auto;font-size:18px">→</span>
  </div>`;
  document.getElementById('ptab-actions').innerHTML=`<div class="card"><div class="card-title">⚡ Actions prioritaires</div>${actions}</div>`;
}

function renderCommissionsTab(d,exp){
  const totalCA=d.montant||0;
  const myPct=d.mandataire_pct||0;
  const myComm=Math.round(totalCA*myPct/100);
  const paye=d.factures.filter(f=>f.statut==='payee').reduce((s,f)=>s+f.montant*myPct/100,0);
  document.getElementById('ptab-commissions').innerHTML=`
    <div class="alert alert-blue"><span>👁️ Vous voyez uniquement vos propres commissions. Les pourcentages des autres mandataires ne sont pas affichés.</span></div>
    <div class="grid3" style="margin-bottom:14px">
      <div class="kpi"><div class="kpi-val" style="color:var(--green)">${Math.round(paye).toLocaleString('fr-FR')}€</div><div class="kpi-lbl">Déjà reçu</div></div>
      <div class="kpi"><div class="kpi-val" style="color:var(--orange)">${Math.max(0,myComm-Math.round(paye)).toLocaleString('fr-FR')}€</div><div class="kpi-lbl">À venir</div></div>
      <div class="kpi"><div class="kpi-val">${myComm.toLocaleString('fr-FR')}€</div><div class="kpi-lbl">Total prévu</div></div>
    </div>
    <div class="card">
      <div class="card-title">💰 Mes factures sur ce dossier</div>
      ${d.factures.length?d.factures.map(f=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-size:12px;font-weight:700">${f.etape}</div><div style="font-size:10px;color:var(--text3)">${f.id} · ${f.date}</div></div>
          <div style="text-align:right"><div style="font-size:14px;font-weight:700">${Math.round(f.montant*myPct/100).toLocaleString('fr-FR')}€</div>
          <span class="badge ${f.statut==='payee'?'badge-green':'badge-yellow'}">${f.statut==='payee'?'✓ Payée':'En attente'}</span></div>
        </div>`).join(''):'<div style="padding:12px;text-align:center;font-size:12px;color:var(--text3)">Aucune facture pour ce dossier</div>'}
      <button class="btn btn-primary" style="width:100%;margin-top:10px;justify-content:center" onclick="alert('Formulaire de déclaration de facture')">+ Déclarer une facture</button>
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-title">ℹ️ Comment fonctionne le paiement</div>
      <div style="display:flex;flex-direction:column;gap:8px;font-size:12px">
        <div style="display:flex;gap:8px;padding:8px;background:var(--bg);border-radius:var(--radius)"><span style="font-weight:700">1.</span><span>L'étape est complétée et validée</span></div>
        <div style="display:flex;gap:8px;padding:8px;background:var(--bg);border-radius:var(--radius)"><span style="font-weight:700">2.</span><span>Vous déclarez votre facture ici</span></div>
        <div style="display:flex;gap:8px;padding:8px;background:var(--bg);border-radius:var(--radius)"><span style="font-weight:700">3.</span><span>Timonia valide et vire sous 5 jours ouvrés</span></div>
      </div>
    </div>`;
}

function advanceStep(dossierId, etapeId){
  const d=getDossier(dossierId);if(!d)return;
  const exp=getExpertise(d.expertise_id);
  const idx=exp.etapes.findIndex(e=>e.id===etapeId);
  if(!d.etapes_done.includes(etapeId)) d.etapes_done.push(etapeId);
  if(idx<exp.etapes.length-1) d.etape_active=exp.etapes[idx+1].id;
  selectDossier(dossierId);
}

renderList();
if(DOSSIERS.length>0) selectDossier(DOSSIERS[0].id);
</script>
</body>
</html>
